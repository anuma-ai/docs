name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - run: pnpm install

      - name: Rebuild docs index if stale
        run: |
          INDEX="public/docs-index.json"
          REBUILD=false
          if [ ! -f "$INDEX" ]; then
            REBUILD=true
          else
            GENERATED=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$INDEX','utf-8')).generatedAt || '')")
            if [ -z "$GENERATED" ]; then
              REBUILD=true
            else
              AGE=$(( ($(date +%s) - $(date -d "$GENERATED" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "${GENERATED%%.*}" +%s)) ))
              WEEK=$((7 * 24 * 60 * 60))
              if [ "$AGE" -gt "$WEEK" ]; then
                REBUILD=true
              fi
            fi
          fi
          if [ "$REBUILD" = true ]; then
            echo "Index is stale or missing, rebuilding..."
            pnpm ingest
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/docs-index.json
            git diff --cached --quiet || git commit -m "Update docs search index" && git push
          else
            echo "Index is fresh, skipping rebuild"
          fi
        env:
          ANUMA_API_KEY: ${{ secrets.ANUMA_API_KEY }}

      - run: pnpm build:cloudflare
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PUBLIC_REPO }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post deploying comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Cloudflare Workers Preview'));
            const body = '⏳ **Cloudflare Workers Preview** — Deploying...';
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - run: pnpm install

      - run: pnpm build:cloudflare
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Deploy preview worker
        id: deploy
        run: |
          WORKER_NAME="docs-pr-${{ github.event.pull_request.number }}"
          pnpm exec wrangler deploy --name "$WORKER_NAME"
          echo "url=https://${WORKER_NAME}.zetachain.workers.dev" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PUBLIC_REPO }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update PR comment with URL
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Cloudflare Workers Preview'));
            const body = `✅ **Cloudflare Workers Preview** — Deployed!\n\n${{ steps.deploy.outputs.url }}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }

      - name: Update PR comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Cloudflare Workers Preview'));
            const body = `❌ **Cloudflare Workers Preview** — Deploy failed.\n\n[View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview worker
        run: |
          WORKER_NAME="docs-pr-${{ github.event.pull_request.number }}"
          npx wrangler delete --name "$WORKER_NAME" --force
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_PUBLIC_REPO }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Cloudflare Workers Preview'));
            if (existing) {
              const action = context.payload.pull_request.merged ? 'merged' : 'closed';
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: `🧹 **Cloudflare Workers Preview** — Cleaned up (PR ${action}).`,
              });
            }
