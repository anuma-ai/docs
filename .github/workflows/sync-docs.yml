name: Sync Docs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone SDK repo
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SDK_REPO_TOKEN }}@github.com/anuma-ai/sdk.git /tmp/sdk

      - name: Clone CLI repo
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SDK_REPO_TOKEN }}@github.com/anuma-ai/cli.git /tmp/cli

      - name: Clone starter-next repo
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SDK_REPO_TOKEN }}@github.com/anuma-ai/starter-next.git /tmp/starter-next

      - name: Clone starter-telegram repo
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SDK_REPO_TOKEN }}@github.com/anuma-ai/starter-telegram.git /tmp/starter-telegram

      - name: Clone starter-agent repo
        run: |
          git clone --depth 1 https://x-access-token:${{ secrets.SDK_REPO_TOKEN }}@github.com/anuma-ai/starter-agent.git /tmp/starter-agent

      - name: Replace SDK docs
        run: |
          rm -rf src/content/sdk
          cp -r /tmp/sdk/docs src/content/sdk

      - name: Replace CLI docs
        run: |
          rm -rf src/content/cli
          cp -r /tmp/cli/docs src/content/cli

      - name: Replace Next.js tutorial docs
        run: |
          rm -rf src/content/tutorials/nextjs
          cp -r /tmp/starter-next/docs/documents src/content/tutorials/nextjs

      - name: Replace Telegram tutorial docs
        run: |
          rm -rf src/content/tutorials/telegram
          cp -r /tmp/starter-telegram/docs/documents src/content/tutorials/telegram

      - name: Replace Agent tutorial docs
        run: |
          rm -rf src/content/tutorials/agent
          cp -r /tmp/starter-agent/docs/documents src/content/tutorials/agent

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SDK_REPO_TOKEN }}
          branch: automated/sync-docs
          title: "docs: sync documentation"
          body: Automated sync of documentation from anuma-ai/sdk, anuma-ai/cli, anuma-ai/starter-next, anuma-ai/starter-telegram, and anuma-ai/starter-agent.
          commit-message: "docs: sync documentation"
          delete-branch: true
