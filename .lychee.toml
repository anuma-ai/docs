# Lychee link checker configuration
# https://lychee.cli.rs/usage/config/

exclude = [
  # Placeholder values in code examples
  "YOUR_ANUMA_API_KEY",
  "your-api-key",
  "example\\.com",
  "localhost",
  "127\\.0\\.0\\.1",
  # Private GitHub repos (404 without auth)
  "^https://github\\.com/anuma-ai/",
  "^https://github\\.com/zeta-chain/ai-",
  # Next.js app routes and public assets (not part of content directory)
  "file://.*/src/content/api$",
  "file://.*/src/content/memory$",
  "\\.webm$",
  # Nextra treats README.md as directory index (resolves at runtime, not on disk)
  "/README$",
]

include_fragments = true

max_concurrency = 16
timeout = 30
max_retries = 3

# Accept 2xx and 429 (rate limited)
accept = [200, 204, 429]
